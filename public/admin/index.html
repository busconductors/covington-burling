<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | Covington &amp; Burling LLP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,300..600;1,300..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <main id="main-content">
    <!-- Login -->
    <section class="admin-login" id="adminLogin">
      <div class="admin-login__card">
        <div class="admin-login__logo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="64" height="64"><g transform="translate(20,20)"><circle cx="60" cy="60" r="56" fill="none" stroke="#0A1628" stroke-width="1.5"/><circle cx="60" cy="60" r="50" fill="none" stroke="#B08D57" stroke-width="2.5"/><text x="60" y="60" text-anchor="middle" dy=".35em" font-family="Cormorant Garamond, Garamond, 'Times New Roman', serif" font-weight="600" font-size="46" letter-spacing="-2" fill="#0A1628">C<tspan fill="#B08D57">B</tspan></text></g></svg>
        </div>
        <h1 class="admin-login__title">Form Request Admin</h1>
        <p class="admin-login__subtitle">Covington &amp; Burling LLP</p>
        <form id="loginForm">
          <div class="form-group">
            <label for="adminPassword" class="form-label">Admin Password</label>
            <input type="password" id="adminPassword" class="form-input" required autocomplete="current-password">
            <span class="form-error-msg" id="login-error" role="alert"></span>
          </div>
          <button type="submit" class="btn btn--primary btn--full">Sign In</button>
        </form>
      </div>
    </section>

    <!-- Dashboard (hidden until login) -->
    <section class="admin-dashboard hidden" id="adminDashboard">
      <header class="admin-dashboard__header">
        <div class="container">
          <div class="admin-dashboard__header-inner">
            <div>
              <h1 class="admin-dashboard__title">Form Requests</h1>
              <p class="admin-dashboard__subtitle">Covington &amp; Burling LLP</p>
            </div>
            <button id="adminLogout" class="btn btn--outline-light">Sign Out</button>
          </div>
        </div>
      </header>
      <div id="adminError" class="form-error-msg admin-error-banner" aria-live="assertive"></div>
      <div class="container admin-dashboard__content">
        <div class="admin-table-wrap" role="region" aria-live="polite" aria-label="Form requests table">
          <div id="adminLoading" class="admin-loading" aria-busy="true" aria-live="polite">Loading requests...</div>
          <div id="adminEmpty" class="admin-empty hidden">
            <p class="admin-empty__title">No requests yet.</p>
            <p>Form requests submitted by clients will appear here.</p>
          </div>
          <table class="admin-table hidden" id="adminTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Email</th>
                <th>Form</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/admin.js" defer></script>
</body>
</html>
